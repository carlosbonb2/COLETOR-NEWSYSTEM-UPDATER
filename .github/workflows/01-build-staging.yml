name: 01 - Deploy Updater (Staging)

on:
  push:
    tags:
      - 'v*-rc'

jobs:
  deploy-staging:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }

      - name: 🏷️ Extrair Versão
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v').Split('-')[0]
          echo "VERSION_NUMBER=$ver" | Out-File -FilePath $env:GITHUB_ENV
        shell: pwsh

      - name: 🔨 Build Staging (Single File)
        run: |
          dotnet restore "LauncherUpdater/LauncherUpdater.csproj"
          dotnet publish "LauncherUpdater/LauncherUpdater.csproj" --configuration Release --self-contained true -r win-x64 --output ./publish /p:Version=${{ env.VERSION_NUMBER }} /p:DefineConstants="STAGING" /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: 🔐 Assinar Executável (Opcional)
        run: |
          $pfx_raw = "${{ secrets.CODE_SIGNING_CERTIFICATE }}"
          if ([string]::IsNullOrWhiteSpace($pfx_raw)) { Write-Host "Sem certificado, pulando..."; return }
          $pfx_clean = $pfx_raw -replace "-----BEGIN CERTIFICATE-----", "" -replace "-----END CERTIFICATE-----", "" -replace "\r", "" -replace "\n", "" -replace " ", ""
          [System.IO.File]::WriteAllBytes("signing_cert.pfx", [System.Convert]::FromBase64String($pfx_clean))
        shell: pwsh
        
      - uses: microsoft/setup-msbuild@v2
      - name: 🔐 Executar Signtool
        run: |
          if (Test-Path "signing_cert.pfx") {
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\signtool.exe" sign /f "signing_cert.pfx" /p "${{ secrets.CODE_SIGNING_PASSWORD }}" /fd SHA256 /tr http://timestamp.digert.com /td SHA256 "publish\LauncherUpdater.exe"
          }
        continue-on-error: true
        shell: pwsh

      - name: 📦 Estruturar Pacote
        run: |
          $folder = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path "./deploy_payload/$folder"

          $zipName = "launcherupdater_release.zip"
          Compress-Archive -Path ./publish/* -DestinationPath "./deploy_payload/$folder/$zipName"
          $hash = (Get-FileHash -Path "./deploy_payload/$folder/$zipName").Hash
          
          $urlZipProtegida = "https://aux.newsystem.net.br/endpoint_pdv/download_gate.php?file=LauncherUpdaterVersions/$folder/$zipName&env=staging"
          
          # Sem ManifestUrl, conforme documentação
          @{ Version = "${{ env.VERSION_NUMBER }}.0"; Url = $urlZipProtegida; Checksum = $hash } | ConvertTo-Json | Set-Content "./deploy_payload/$folder/LauncherUpdaterVersion.json"
          
          @{ CurrentFolder = $folder } | ConvertTo-Json | Set-Content "./deploy_payload/LauncherUpdaterVersionMaster.json"
        shell: pwsh

      - name: 🔑 Configurar Chave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🚀 Upload via SCP (Staging)
        run: scp -v -r -o StrictHostKeyChecking=no -P 1891 ./deploy_payload/* "${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:public_html/auxiliares/endpoint_pdv/updates_staging/LauncherUpdaterVersions/"
        shell: bash