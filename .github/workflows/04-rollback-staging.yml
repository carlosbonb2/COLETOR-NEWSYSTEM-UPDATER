name: 04 - Rollback Updater (Staging)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag Antiga para Reverter (ex: v1.0.0)'
        required: true
      confirm:
        description: 'Digite EXECUTAR para confirmar'
        required: true

jobs:
  build-rollback:
    if: github.event.inputs.confirm == 'EXECUTAR'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: ⏱️ Voltar no Tempo
        run: git checkout ${{ github.event.inputs.version_tag }}
        shell: pwsh

      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }

      - name: 🔨 Recompilar como Staging
        run: |
          $ver = "${{ github.event.inputs.version_tag }}".TrimStart('v')
          $csproj = Get-ChildItem -Path . -Filter *.csproj -Recurse | Select-Object -First 1
          dotnet publish "$($csproj.FullName)" --configuration Release --self-contained true -r win-x64 --output ./publish /p:Version=$ver /p:DefineConstants="STAGING" /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true
        shell: pwsh

      - name: 📦 Estruturar Pacote Rollback
        shell: pwsh
        run: |
          $targetTag = "${{ github.event.inputs.version_tag }}-rc"
          $ver = "${{ github.event.inputs.version_tag }}".TrimStart('v')
          New-Item -ItemType Directory -Force -Path "./deploy_payload/$targetTag"

          $zipName = "updater.zip"
          Compress-Archive -Path ./publish/* -DestinationPath "./deploy_payload/$targetTag/$zipName"
          $hash = (Get-FileHash -Path "./deploy_payload/$targetTag/$zipName").Hash

          $urlZip = "https://aux.newsystem.net.br/endpoint_coletor/download_gate.php?file=ColetorLauncherUpdaterVersions/$targetTag/$zipName&env=staging"
          
          @{ Version = "$ver.0"; Url = $urlZip; Checksum = $hash } | ConvertTo-Json | Set-Content "./deploy_payload/$targetTag/ColetorUpdaterVersion.json"
          @{ CurrentFolder = $targetTag } | ConvertTo-Json | Set-Content "./deploy_payload/ColetorUpdaterVersionMaster.json"

      - name: ⬆️ Guardar Pacote para o Robô Linux
        uses: actions/upload-artifact@v4
        with:
          name: rollback-payload
          path: deploy_payload/
          retention-days: 1

  deploy-rollback:
    needs: build-rollback
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Puxar Pacote do Robô Windows
        uses: actions/download-artifact@v4
        with:
          name: rollback-payload
          path: deploy_payload

      - name: 🚀 Upload do Rollback via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: 1891
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SFTP_KEY }}
          source: "deploy_payload/*"
          target: "/home/newsyste/public_html/auxiliares/endpoint_coletor/updates_staging/ColetorLauncherUpdaterVersions/"
          strip_components: 1